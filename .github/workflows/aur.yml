name: AUR

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Derive package version from tag
        id: version
        run: echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Render PKGBUILD for this release
        run: |
          sed "s/^pkgver=.*/pkgver=${{ steps.version.outputs.pkgver }}/" \
            aur/PKGBUILD > /tmp/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: packer-plugin-builder-arm-git
          pkgbuild: /tmp/PKGBUILD
          commit_username: Mateusz Kaczanowski
          commit_email: kaczanowski.mateusz@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          allow_empty_commits: false
