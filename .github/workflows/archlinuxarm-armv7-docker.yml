name: Archlinuxarm armv7 docker
on:
  push:
    branches: [ master ]
  schedule:
    # once a week
    - cron:  '0 0 * * 1'
jobs:

  build:
    name: Push archlinuxarm-armv7 image to docker registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v7.0.1

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
        id: go

      - name: Get dependencies
        run: |
          go get -v -t -d ./...
          if [ -f Gopkg.toml ]; then
              curl https://raw.githubusercontent.com/golang/dep/master/install.sh | sh
              dep ensure
          fi

      - name: Fetch additional packages
        run: |
          sudo apt-get update
          sudo apt-get install fdisk gdisk qemu-user-static libarchive-tools tar

      - name: Build
        run: go build -v -o packer-plugin-builder-arm .

      - name: Install Packer
        uses: hashicorp-contrib/setup-packer@v4
        with:
          packer-version: 1.15.4

      - name: Install arm builder plugin
        run: |
          chmod +x packer-plugin-builder-arm
          sudo packer plugins install --path ./packer-plugin-builder-arm github.com/mkaczanowski/arm

      - name: Install packer plugins
        run: sudo packer init boards/armv7/archlinuxarm-docker.pkr.hcl

      - name: Build image
        run: |
          sudo packer build \
            -var docker_user=$docker_user \
            -var docker_password=$docker_password \
            -var docker_repository=$docker_repository \
            boards/armv7/archlinuxarm-docker.pkr.hcl
        env:
          docker_user: ${{ secrets.docker_user }}
          docker_password: ${{ secrets.docker_password }}
          docker_repository: mkaczanowski/archlinuxarm
